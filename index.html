<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum Digital</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0e0a14;--bg2:#171022;--panel:#1f1530;--panel-2:#2a1d3f;--line:#3a2a52;
  --maroon:#7a1330;--maroon-2:#a31b40;--gold:#e8c469;--gold-2:#b8922f;
  --cyan:#2fd1c6;--cyan-ink:#06342f;--ink:#f4eefb;--muted:#a293bd;
  --good:#4ad07a;--bad:#ef5f7a;--radius:18px;--shadow:0 18px 50px rgba(0,0,0,.55);
  --display:"Bebas Neue","Arial Narrow",sans-serif;--body:"Inter",system-ui,sans-serif;
  --r-comun:#7c8aa0;--r-rara:#4aa3ff;--r-ultra:#b46bff;--r-extra:#ffcf3a;--r-escudo:#46e08a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:var(--body);color:var(--ink);
  background:radial-gradient(1200px 700px at 50% -10%,#2a1640 0%,transparent 60%),
             radial-gradient(900px 600px at 100% 100%,#3a0f25 0%,transparent 55%),var(--bg);overflow:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{max-width:100%;display:block}
#app{height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;max-width:1100px;margin:0 auto;width:100%}
body.mode-mobile #app{max-width:440px;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 20px 84px;display:flex;flex-direction:column}
.screen::-webkit-scrollbar{width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px 4px;gap:14px;flex:none}
.brand{display:flex;align-items:center;gap:14px;min-width:0}
.brand .logo{width:50px;height:50px;border-radius:13px;background:rgba(0,0,0,.25);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;flex:none;font-size:24px}
.brand .logo img{width:100%;height:100%;object-fit:contain}
.brand .txt{line-height:.86;min-width:0}
.brand .eyebrow{font-size:10px;letter-spacing:.32em;color:var(--gold);font-weight:700;text-transform:uppercase}
.brand h1{font-family:var(--display);font-size:30px;letter-spacing:.02em;margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand h1 b{color:var(--gold)}
.hero-line{font-size:12px;color:var(--muted);margin:2px 0 14px;padding:0 2px}

.home-wrap{flex:1;display:flex;flex-direction:column;justify-content:center}
.home-row{display:flex;gap:18px;align-items:stretch;width:100%}
.tile{position:relative;flex:1 1 0;min-width:0;border-radius:var(--radius);padding:18px;background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);overflow:hidden;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;box-shadow:var(--shadow);transition:transform .18s ease,box-shadow .18s ease,border-color .18s;min-height:230px}
.tile:hover{transform:translateY(-8px) scale(1.05);box-shadow:0 26px 60px rgba(0,0,0,.6);border-color:var(--gold-2);z-index:2}
.tile:active{transform:scale(1.01)}
.tile .art{width:96px;height:96px;border-radius:18px;display:grid;place-items:center;font-size:44px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.06);overflow:hidden;flex:none}
.tile .art.bare{background:none;border:none;border-radius:0;width:auto;height:auto}
.tile .art img{width:100%;height:100%;object-fit:cover}
.tile .label{font-family:var(--display);font-size:26px;letter-spacing:.03em;margin-top:2px}
.tile .sub{font-size:11px;color:var(--muted);line-height:1.25}
.tile.fullimg{padding:0;justify-content:flex-end}
.tile.fullimg .fullbg{position:absolute;inset:0;background-size:cover;background-position:center}
.tile.fullimg .fulltint{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(8,5,14,.85))}
.tile.fullimg .label,.tile.fullimg .sub{position:relative;z-index:2;padding:0 10px}
.tile.fullimg .label{margin-bottom:4px}.tile.fullimg .sub{margin-bottom:16px}
.tile .badge{position:absolute;top:11px;right:11px;background:var(--cyan);color:var(--cyan-ink);font-weight:800;font-size:12px;min-width:24px;height:24px;border-radius:8px;display:grid;place-items:center;padding:0 6px;box-shadow:0 4px 10px rgba(47,209,198,.35);z-index:3}
@media(max-width:760px){.home-row{flex-wrap:wrap}.tile{flex:1 1 40%;min-height:150px}.tile .art{width:64px;height:64px;font-size:32px}.tile .label{font-size:22px}}

.bottomnav{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:8px;align-items:center;background:linear-gradient(180deg,rgba(20,12,32,.6),rgba(14,10,20,.96));backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));flex:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;padding:6px 18px;border-radius:12px}
.nav-btn .ico{font-size:20px;line-height:1}
.nav-btn.active{color:var(--gold)}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex:none}
.back{width:38px;height:38px;border-radius:12px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;font-size:18px;flex:none}
.sec-head .eyebrow{font-size:10px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;font-weight:700}
.sec-head h2{font-family:var(--display);font-size:30px;margin:1px 0 0;letter-spacing:.02em}

.r-comun{--rc:var(--r-comun)}.r-rara{--rc:var(--r-rara)}.r-ultra{--rc:var(--r-ultra)}.r-extra{--rc:var(--r-extra)}.r-escudo{--rc:var(--r-escudo)}
.rar-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--rc,var(--r-comun));margin-right:5px;vertical-align:middle}
@keyframes shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shine-fx::before,.shine-extra::before,.shine-escudo::before{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;background-size:200% 100%;animation:shine 3s linear infinite;mix-blend-mode:screen}
.shine-fx::before{background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.55) 48%,rgba(255,255,255,.9) 50%,rgba(255,255,255,.55) 52%,transparent 65%)}
.shine-extra::before{background:linear-gradient(115deg,transparent 30%,rgba(255,225,130,.5) 45%,rgba(255,247,200,.95) 50%,rgba(255,210,90,.5) 55%,transparent 70%)}
.shine-escudo::before{background:linear-gradient(115deg,transparent 30%,rgba(120,255,200,.45) 45%,rgba(220,255,240,.9) 50%,rgba(80,230,170,.45) 55%,transparent 70%)}
.glow-frame{box-shadow:0 0 0 2px var(--rc) inset,0 0 14px color-mix(in srgb,var(--rc) 55%,transparent)}

.coll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.sticker{aspect-ratio:3/4;border-radius:12px;position:relative;overflow:hidden;background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.sticker.wide{grid-column:span 2;aspect-ratio:3/2}
.sticker.have{border-color:var(--rc,var(--gold-2))}
.sticker.missing{background:repeating-linear-gradient(45deg,#1a1228,#1a1228 8px,#201631 8px,#201631 16px)}
.sticker .num{position:absolute;top:5px;left:6px;font-size:10px;font-weight:800;color:var(--gold);background:rgba(0,0,0,.45);padding:1px 5px;border-radius:6px;z-index:5}
.sticker .qty{position:absolute;bottom:5px;right:5px;background:var(--cyan);color:var(--cyan-ink);font-weight:800;font-size:11px;border-radius:7px;padding:1px 7px;z-index:5}
.sticker .pegado{position:absolute;top:5px;right:6px;background:var(--good);color:#063018;font-weight:800;font-size:8px;letter-spacing:.05em;border-radius:6px;padding:2px 5px;z-index:6}
.sticker .q{font-size:32px;color:var(--muted);font-weight:800}
.sticker .photo{width:100%;height:100%;object-fit:cover}
.sticker .name{position:absolute;bottom:0;left:0;right:0;font-size:9px;text-align:center;padding:3px 2px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.8));font-weight:600;z-index:5}

.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-body::-webkit-scrollbar{width:0}
.panel{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:13px}
.panel h3{font-family:var(--display);font-size:20px;margin:0 0 4px;letter-spacing:.03em}
.panel p{font-size:13px;color:var(--muted);margin:0}
.row{display:flex;gap:10px;align-items:center}
input,select,textarea{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:12px 13px;font-size:14px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-2)}
label.fld{display:block;font-size:11px;letter-spacing:.04em;color:var(--muted);margin:0 0 5px;font-weight:600;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(180deg,var(--maroon-2),var(--maroon));color:#fff;font-weight:700;border-radius:12px;padding:13px 18px;font-size:14px;border:1px solid rgba(255,255,255,.1);width:100%;box-shadow:0 8px 20px rgba(122,19,48,.35)}
.btn:active{transform:scale(.98)}
.btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-2));color:#2a1c05;box-shadow:0 8px 20px rgba(232,196,105,.3)}
.btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.sm{width:auto;padding:9px 14px;font-size:12px}
.btn.danger{background:linear-gradient(180deg,#c33,#922)}
.toggle{display:flex;align-items:center;gap:9px;cursor:pointer}
.toggle .tk{width:42px;height:24px;border-radius:99px;background:var(--line);position:relative;transition:background .15s;flex:none}
.toggle .tk::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s}
.toggle.on .tk{background:var(--gold)}
.toggle.on .tk::after{transform:translateX(18px)}
.toggle .tl{font-size:12px;font-weight:600}

.auth-wrap{height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:26px;max-width:430px;margin:0 auto}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .biglogo{width:96px;height:96px;margin:0 auto 12px;border-radius:22px;background:rgba(0,0,0,.25);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;font-size:46px}
.auth-logo .biglogo img{width:100%;height:100%;object-fit:contain}
.auth-logo .eyebrow{font-size:11px;letter-spacing:.4em;color:var(--gold);font-weight:700}
.auth-logo h1{font-family:var(--display);font-size:46px;margin:6px 0 0;line-height:.9}
.auth-logo h1 b{color:var(--gold)}
.auth-card{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:var(--shadow)}
.auth-card .stack>*+*{margin-top:12px}
.switch{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
.switch b{color:var(--gold);font-weight:700}
.err{color:var(--bad);font-size:12px;margin-top:6px;min-height:14px}

/* ---------- ÁLBUM LIBRO (alto, tipo libro real) ---------- */
.book-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:0;overflow:hidden}
.book{display:flex;gap:0;width:100%;max-width:820px;flex:1;min-height:0;align-items:stretch;margin-bottom:4px}
.book.one{max-width:380px}  /* modo celular: una sola página angosta */
.page{flex:1 1 0;min-width:0;min-height:0;background:linear-gradient(180deg,#241634,#150e22);border:1px solid var(--line);position:relative;overflow:hidden;background-size:cover;background-position:center;display:flex;flex-direction:column}
.page.left{border-radius:12px 0 0 12px;border-right:2px solid rgba(0,0,0,.55)}
.page.right{border-radius:0 12px 12px 0;border-left:1px solid rgba(255,255,255,.05)}
.page.single{border-radius:12px;max-width:50%;margin:0 auto}
body.mode-mobile .page.single{max-width:100%}
.page .spine{position:absolute;top:0;bottom:0;width:16px;pointer-events:none;z-index:3}
.page.left .spine{right:0;background:linear-gradient(90deg,transparent,rgba(0,0,0,.5))}
.page.right .spine{left:0;background:linear-gradient(270deg,transparent,rgba(0,0,0,.4))}
.page .overlay{position:absolute;inset:0;background:rgba(10,7,18,.4);pointer-events:none}
.page-inner{position:relative;z-index:1;padding:12px;display:flex;flex-direction:column;height:100%;min-height:0;gap:8px}
.cover-page{align-items:center;justify-content:center;text-align:center;gap:10px}
.cover-page .cov-logo{font-size:50px}
.cover-page .cov-title{font-family:var(--display);font-size:34px;line-height:.9}
.cover-page .cov-title b{color:var(--gold)}
.cover-page .cov-sub{font-size:11px;color:var(--muted);letter-spacing:.25em;text-transform:uppercase}
.cover-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:0}
/* grilla de página: filas iguales, celdas 3:4 */
.pgrid{display:grid;flex:1;gap:6px;min-height:0}
.team-title{display:flex;flex-direction:column;justify-content:center;gap:5px;padding:4px;min-height:0}
.team-title .crest{width:38px;height:38px;border-radius:8px;background:rgba(0,0,0,.3);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;font-size:20px}
.team-title .crest img{width:100%;height:100%;object-fit:contain}
.team-title .tname{font-family:var(--display);font-size:18px;letter-spacing:.03em;line-height:.95}
.team-title .half{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:.1em}
.mslot{border-radius:6px;border:1.5px dashed var(--line);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);min-height:0;width:100%;height:100%}
.mslot.wide{grid-column:span 2}
.mslot.filled{border-style:solid;border-color:var(--rc,var(--gold-2))}
.mslot.placeable{border-color:var(--cyan);box-shadow:0 0 0 1.5px rgba(47,209,198,.3) inset;cursor:pointer}
.mslot.placeable:active{transform:scale(.93)}
.mslot .plus{font-size:16px;color:var(--cyan);font-weight:300}
.mslot .num{position:absolute;top:1px;left:2px;font-size:7px;font-weight:800;color:var(--gold);background:rgba(0,0,0,.55);padding:0 3px;border-radius:3px;z-index:5}
.mslot img{width:100%;height:100%;object-fit:contain}
.mslot .glint{position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.5) 50%,transparent 70%);animation:glint 1.4s linear infinite}
@keyframes glint{0%{transform:translateX(-120%)}100%{transform:translateX(120%)}}
@keyframes stickdrop{0%{transform:translateY(-16px) scale(1.25) rotate(-6deg);opacity:0}55%{transform:translateY(2px) scale(.95);opacity:1}100%{transform:translateY(0) scale(1)}}
.mslot .stickin{animation:stickdrop .45s cubic-bezier(.2,1.4,.4,1) forwards;width:100%;height:100%}
.stamp{position:absolute;inset:0;border:2px solid var(--cyan);border-radius:6px;animation:stamp .5s ease forwards;pointer-events:none;z-index:6}
@keyframes stamp{0%{transform:scale(1.4);opacity:.9}100%{transform:scale(1);opacity:0}}
@keyframes pageInR{0%{opacity:0;transform:translateX(28px)}100%{opacity:1;transform:translateX(0)}}
@keyframes pageInL{0%{opacity:0;transform:translateX(-28px)}100%{opacity:1;transform:translateX(0)}}
.book.turn-next{animation:pageInR .28s ease}
.book.turn-prev{animation:pageInL .28s ease}
.album-ctrls{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:12px;flex:none}
.arrow{width:46px;height:46px;border-radius:14px;background:linear-gradient(180deg,var(--maroon-2),var(--maroon));display:grid;place-items:center;font-size:22px;color:#fff;border:1px solid rgba(255,255,255,.1)}
.arrow:disabled{opacity:.3}
.pageno{font-size:12px;color:var(--muted);font-weight:600;text-align:center;min-width:130px}
.album-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px;flex:none}
.pile{background:linear-gradient(180deg,var(--gold),var(--gold-2));color:#2a1c05;border-radius:13px;padding:8px 12px;font-weight:800;font-size:12px;box-shadow:0 8px 18px rgba(0,0,0,.35);display:flex;align-items:center;gap:7px}
.pile .pileart{width:26px;height:34px;border-radius:5px;overflow:hidden;border:1px solid rgba(0,0,0,.2);display:grid;place-items:center;background:var(--panel-2)}
.album-index{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px}
.idx-team{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.idx-team .crest{width:40px;height:40px;margin:0 auto;border-radius:9px;background:var(--panel-2);display:grid;place-items:center;overflow:hidden;font-size:20px}
.idx-team .crest img{width:100%;height:100%;object-fit:contain}
.idx-team .tn{font-size:10px;color:var(--muted);margin-top:5px;font-weight:600}
.idx-team .prog{font-size:10px;color:var(--gold);font-weight:800;margin-top:2px}

.pack-flash{position:fixed;inset:0;z-index:200;background:radial-gradient(circle at 50% 50%,#fff,var(--gold) 40%,var(--maroon) 100%);display:grid;place-items:center;animation:flash 1.1s ease forwards}
@keyframes flash{0%{opacity:0;transform:scale(.6)}25%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.3)}}
.reveal{position:fixed;inset:0;z-index:190;background:rgba(10,7,16,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:22px}
.reveal h3{font-family:var(--display);font-size:38px;margin:0}
.reveal-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.reveal-card{width:150px;aspect-ratio:3/4;border-radius:16px;overflow:hidden;border:2px solid var(--rc,var(--gold-2));transform:rotateY(90deg);animation:flip .5s ease forwards;position:relative}
.reveal-card:nth-child(1){animation-delay:.05s}.reveal-card:nth-child(2){animation-delay:.2s}.reveal-card:nth-child(3){animation-delay:.35s}.reveal-card:nth-child(4){animation-delay:.5s}.reveal-card:nth-child(5){animation-delay:.65s}
@keyframes flip{to{transform:rotateY(0)}}
.reveal-card.new::after{content:"NUEVA";position:absolute;top:6px;right:6px;background:var(--cyan);color:var(--cyan-ink);font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;z-index:6}
.reveal-card .photo{width:100%;height:100%;object-fit:cover}
.reveal-card .ph{width:100%;height:100%;display:grid;place-items:center;background:var(--panel-2);font-size:22px;font-weight:800;color:var(--gold)}
.reveal-card .rlabel{position:absolute;bottom:0;left:0;right:0;font-size:10px;text-align:center;padding:4px 2px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.85));font-weight:700;z-index:5}
@media(max-width:680px){.reveal-card{width:108px}.reveal-cards{gap:10px}}
.pack-shelf{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.envelope{width:118px;height:150px;border-radius:14px;position:relative;background:linear-gradient(160deg,var(--maroon-2),var(--maroon));border:1px solid var(--gold-2);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:12px;overflow:hidden;transition:transform .12s}
.envelope:active{transform:scale(.95)}
.envelope.hasimg{padding:0}
.envelope .envimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.envelope .envtint{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.7));z-index:1}
.envelope::before{content:"";position:absolute;top:0;left:0;right:0;height:54%;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);clip-path:polygon(0 0,100% 0,50% 100%);z-index:1}
.envelope .ttl{font-family:var(--display);font-size:18px;color:var(--gold);z-index:2}
.envelope .pl{font-size:9px;color:rgba(255,255,255,.75);z-index:2;text-align:center;padding:0 6px}
.empty-note{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px}

.offer{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:11px}
.offer .who{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px}
.offer .deal{display:flex;align-items:center;gap:10px;justify-content:space-between}
.offer .side{flex:1;text-align:center}
.offer .side .lab{font-size:9px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;font-weight:700}
.offer .side .card{margin:6px auto 0;width:52px;aspect-ratio:3/4;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:var(--panel-2);display:grid;place-items:center;font-size:14px;font-weight:800;position:relative}
.offer .side .card img{width:100%;height:100%;object-fit:cover}
.offer .arrow-mid{font-size:20px;color:var(--cyan)}

.admin-tabs{display:flex;gap:7px;overflow-x:auto;overflow-y:hidden;padding:0 0 12px;margin-bottom:6px;-webkit-overflow-scrolling:touch;flex:none}
.admin-tabs::-webkit-scrollbar{height:5px}.admin-tabs::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
.atab{flex:0 0 auto;white-space:nowrap;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:12px;font-weight:600;color:var(--muted)}
.atab.active{background:var(--gold);color:#2a1c05;border-color:var(--gold)}
.adm-item{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;flex-wrap:wrap}
.adm-item .thumb{width:40px;height:50px;border-radius:7px;background:var(--panel-2);flex:none;display:grid;place-items:center;font-weight:800;color:var(--gold);font-size:12px;overflow:hidden}
.adm-item .thumb img{width:100%;height:100%;object-fit:cover}
.adm-item .meta{flex:1;min-width:120px}
.adm-item .meta .t{font-weight:700;font-size:13px}
.adm-item .meta .s{font-size:11px;color:var(--muted)}
.modal-bg{position:fixed;inset:0;z-index:150;background:rgba(6,4,10,.75);display:grid;place-items:center;padding:20px}
.modal{width:100%;max-width:430px;background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow);max-height:88dvh;overflow-y:auto}
.modal h3{font-family:var(--display);font-size:24px;margin:0 0 14px}
.modal .stack>*+*{margin-top:11px}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--gold);color:#2a1c05;font-weight:700;font-size:13px;padding:11px 18px;border-radius:999px;z-index:300;box-shadow:var(--shadow);animation:toastin .3s ease}
@keyframes toastin{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
.muted{color:var(--muted)}.sp{height:8px}
.reto-card{background:linear-gradient(135deg,var(--maroon),#5a0d22);border:1px solid var(--gold-2);border-radius:16px;padding:18px}
.reto-card .wk{font-size:10px;letter-spacing:.3em;color:var(--gold);font-weight:700;text-transform:uppercase}
.reto-card h3{font-family:var(--display);font-size:26px;margin:5px 0 6px}
.reto-card p{font-size:13px;color:rgba(255,255,255,.82)}
.reto-card .reward{margin-top:12px;display:inline-flex;gap:6px;align-items:center;background:rgba(0,0,0,.3);padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700}

body.editing [data-edit]{outline:2px dashed var(--cyan);outline-offset:2px;cursor:text;border-radius:4px;transition:background .12s}
body.editing [data-edit]:hover{background:rgba(47,209,198,.12)}
.edit-banner{position:fixed;top:0;left:0;right:0;z-index:400;background:linear-gradient(180deg,var(--cyan),#1ba99f);color:var(--cyan-ink);text-align:center;font-size:12px;font-weight:800;padding:8px;display:flex;align-items:center;justify-content:center;gap:14px}
.edit-banner button{background:var(--cyan-ink);color:#fff;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700}
.insp-bg{perspective:1200px}
.insp-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:10px}
.insp-card{position:relative;border-radius:16px;overflow:hidden;border:2px solid var(--rc,var(--gold-2));background:var(--panel-2);transition:transform .08s ease;transform-style:preserve-3d;box-shadow:0 30px 60px rgba(0,0,0,.6);max-height:62vh}
.insp-card img{width:100%;height:100%;object-fit:contain;display:block}
.insp-card .num{position:absolute;top:8px;left:9px;font-size:12px;font-weight:800;color:var(--gold);background:rgba(0,0,0,.5);padding:2px 7px;border-radius:7px;z-index:5}
.insp-card .insp-ph{width:100%;height:100%;display:grid;place-items:center;font-size:40px;font-weight:800;color:var(--gold)}
.insp-card .insp-gloss{position:absolute;inset:0;z-index:4;pointer-events:none}
.insp-info{text-align:center}
.insp-info .t{font-family:var(--display);font-size:24px;letter-spacing:.02em}
.insp-info .s{font-size:12px;color:var(--muted);margin-top:2px}
.prog-big{font-family:var(--display);font-size:46px;color:var(--gold);line-height:1}
.prog-big span{font-family:var(--body);font-size:13px;color:var(--muted);font-weight:600;margin-left:6px}
.prog-bar{height:10px;background:var(--bg2);border-radius:99px;overflow:hidden;margin:10px 0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--maroon-2),var(--gold));border-radius:99px;transition:width .4s}
.stat-row{display:flex;gap:10px;margin-top:6px}
.stat{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center}
.stat .sv{font-family:var(--display);font-size:24px;color:var(--ink)}
.stat .sl{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
/* en celular la página única ocupa casi toda la pantalla */
body.mode-mobile .book.one{max-width:100%}
body.mode-mobile .book-area{padding:0 4px}
.sticker.pegada-gris .photo,.sticker.pegada-gris .ph{filter:grayscale(1) brightness(.7)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app"></div>
<script>
const RAR={comun:{label:"Común",cls:"r-comun"},rara:{label:"Rara",cls:"r-rara"},ultra:{label:"Ultra rara",cls:"r-ultra"},extra:{label:"Extra sticker",cls:"r-extra"},escudo:{label:"Escudo",cls:"r-escudo"}};
const RAR_KEYS=["comun","rara","ultra","extra","escudo"];
const GLOW=["extra","escudo"]; // rarezas que brillan

const G={
  config:{title:"COPA",titleAccent:"DIGITAL",homeSub:"Tu álbum. Tus reglas. Pegá, intercambiá y completá.",logo:null,slotsPerTeam:20,
    cover:null,backCover:null,packImg:null,
    text:{
      tile_coleccion:"Colección",tile_codigos:"Códigos",tile_album:"Mi álbum",tile_intercambio:"Intercambiar",tile_sobres:"Sobres",
      sub_coleccion:"Lo que conseguiste",sub_codigos:"Canjeá recompensas",sub_album:"Pegá tus figuritas",sub_intercambio:"Ofrecé y recibí",sub_sobres:"1 gratis por día",
      nav_inicio:"Inicio",nav_retos:"Retos",nav_admin:"Admin",nav_config:"Ajustes",
      codigos_titulo:"Canjeá un código",codigos_desc:"Sumá sobres o figuritas con un código promocional.",
      sobre_diario_titulo:"Sobre diario",cover_sub:"Álbum oficial"
    },
    tiles:{coleccion:{cover:null,fullImage:false},codigos:{cover:null,fullImage:false},album:{cover:null,fullImage:false},intercambio:{cover:null,fullImage:false},sobres:{cover:null,fullImage:false}}},
  stickers:[],
  teams:[{id:"EQA",name:"Equipo Rojo",crest:null,bg:null},{id:"EQB",name:"Equipo Azul",crest:null,bg:null},{id:"EQC",name:"Equipo Verde",crest:null,bg:null}],
  codes:[],retos:[],users:{}};
let CUR=null,view="home",bookPage=0,pageDir=0,albumIndexOpen=false,tradeOffers=[],isAdmin=false,adminTab="figuritas",authMode="login",editing=false;
let viewMode="desktop"; // "desktop" = 2 páginas por vista; "mobile" = 1 página por vista
// memoria del formulario de crear figurita (recuerda última elección)
const figForm={rarity:"comun",wide:false,placeable:true,inPack:true,team:null};
// filtros del panel admin de figuritas
let admFilter={rar:"todas",team:"todos",q:""};
// estado de colección (orden y filtros)
let collSort="album"; // album|num|rareza|equipo
let collFilter={rar:"todas",team:"todos"};
function T(k){return G.config.text[k]!==undefined?G.config.text[k]:k;}

const sampleNames=["Escudo Rojo","Jugador 2","Jugador 3","Jugador 4","Jugador 5","Jugador 6","Jugador 7","Jugador 8","Jugador 9","Jugador 10"];
function seed(){
  G.stickers=[];
  const tm=["EQA","EQA","EQA","EQA","EQB","EQB","EQB","EQC","EQC","EQC"];
  const rr=["escudo","comun","rara","comun","ultra","comun","rara","comun","extra","rara"];
  for(let i=0;i<10;i++)G.stickers.push({id:"S"+(i+1),num:i+1,name:sampleNames[i],team:tm[i],img:null,rarity:rr[i],wide:false,placeable:true});
  G.codes=[{code:"BIENVENIDA",type:"sobres",amount:1,used:[]},{code:"EXTRA3",type:"figus",amount:3,used:[]}];
  G.retos=[{week:"Semana 1",title:"Primer arranque",desc:"Abrí tus sobres y pegá al menos 2 figuritas.",reward:"+1 sobre"}];
}
/* lista ordenada de figuritas de un equipo */
function teamStickers(teamId){return G.stickers.filter(s=>s.team===teamId).sort((a,b)=>a.num-b.num);}
function newUser(u,p){return{username:u,password:p,inventory:{},pasted:{},packs:[],lastDaily:0,codesUsed:[]};}
function bootstrapDemoSession(){seed();const u=newUser("jugador","1234");u.packs=["P1","P2","P3"];G.users["jugador"]=u;}

const $=(q,e=document)=>e.querySelector(q);
const el=(h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
function user(){return G.users[CUR];}
function toast(m){const t=el(`<div class="toast">${m}</div>`);document.body.appendChild(t);setTimeout(()=>{t.style.transition="opacity .3s";t.style.opacity=0;setTimeout(()=>t.remove(),300)},1700);}
function totalQty(u){return Object.values(u.inventory).reduce((a,b)=>a+b,0);}
function randSticker(){return G.stickers[Math.floor(Math.random()*G.stickers.length)];}
function fileToDataURL(f,cb){const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f);}
function rclass(s){return s&&RAR[s.rarity]?RAR[s.rarity].cls:"r-comun";}
function glows(s){return s&&GLOW.includes(s.rarity);}
function shineClass(s){if(!glows(s))return "";return (s.rarity==="extra"?"shine-extra":"shine-escudo")+" glow-frame";}
function canPaste(s){return s && !(s.rarity==="extra" && s.placeable===false);}
function figFace(s){if(!s)return`<div class="ph">?</div>`;if(s.img)return`<img class="photo" src="${s.img}">`;return`<div class="ph">#${s.num}</div>`;}
function crestFace(t){return t.crest?`<img src="${t.crest}">`:"🛡️";}
function E(key){return`<span data-edit="${key}">${T(key)}</span>`;}

const VIEWS={home:renderHome,coleccion:renderColeccion,codigos:renderCodigos,album:renderAlbum,intercambio:renderTrade,sobres:renderPacks,retos:renderRetos,config:renderConfig,admin:renderAdmin,perfil:renderPerfil};
function applyBranding(){
  // título de la pestaña
  document.title=(G.config.title||"Álbum")+" "+(G.config.titleAccent||"");
  // favicon = logo de la competición (si hay)
  if(G.config.logo){
    let link=document.querySelector("link[rel~='icon']");
    if(!link){link=document.createElement("link");link.rel="icon";document.head.appendChild(link);}
    link.href=G.config.logo;
  }
}
function render(){
  applyBranding();
  document.body.classList.toggle("mode-mobile",viewMode==="mobile");
  const app=$("#app");
  if(!CUR){app.innerHTML="";app.appendChild(renderAuth());return;}
  app.innerHTML="";
  if(editing)app.appendChild(renderEditBanner());
  app.appendChild(renderTopbar());
  const screen=el(`<div class="screen"></div>`);
  app.appendChild(screen);app.appendChild(renderBottomNav());
  (VIEWS[view]||renderHome)(screen);
  if(editing)bindEditables();
}
function renderEditBanner(){
  const b=el(`<div class="edit-banner"><span>✏️ Editor de textos activo — tocá un texto resaltado para cambiarlo</span><button id="edone">Terminar</button></div>`);
  b.querySelector("#edone").onclick=()=>{editing=false;document.body.classList.remove("editing");view="admin";adminTab="editor";render();};
  return b;
}
function bindEditables(){
  document.body.classList.add("editing");
  document.querySelectorAll("[data-edit]").forEach(n=>{n.onclick=async(e)=>{e.preventDefault();e.stopPropagation();const key=n.getAttribute("data-edit");
    if(key==="_homeSub"){const v=prompt("Editar texto:",G.config.homeSub);if(v!==null){G.config.homeSub=v;await saveConfig();render();}return;}
    const val=prompt("Editar texto:",T(key));if(val!==null){G.config.text[key]=val;await saveConfig();render();}};});
}
function renderTopbar(){return el(`<div class="topbar" style="${editing?'margin-top:34px':''}"><div class="brand"><div class="logo">${G.config.logo?`<img src="${G.config.logo}">`:"🏆"}</div><div class="txt"><span class="eyebrow">Álbum digital</span><h1>${G.config.title} <b>${G.config.titleAccent}</b></h1></div></div></div>`);}
function renderBottomNav(){
  const nav=el(`<div class="bottomnav"></div>`);
  [{id:"home",ico:"🏠",lab:T("nav_inicio")},{id:"perfil",ico:"👤",lab:"Mi perfil"},{id:"retos",ico:"🎯",lab:T("nav_retos")},{id:"admin",ico:"🛠️",lab:T("nav_admin")},{id:"config",ico:"⚙️",lab:T("nav_config")}].forEach(it=>{
    const b=el(`<button class="nav-btn ${view===it.id?'active':''}"><span class="ico">${it.ico}</span>${it.lab}</button>`);
    b.onclick=()=>{if(editing)return;if(it.id==="admin")openAdminLogin();else{view=it.id;albumIndexOpen=false;render();}};nav.appendChild(b);});
  return nav;
}
function renderAuth(){
  const wrap=el(`<div class="auth-wrap"></div>`);
  wrap.appendChild(el(`<div class="auth-logo"><div class="biglogo">${G.config.logo?`<img src="${G.config.logo}">`:"🏆"}</div><div class="eyebrow">ÁLBUM DIGITAL</div><h1>${G.config.title} <b>${G.config.titleAccent}</b></h1></div>`));
  const card=el(`<div class="auth-card"></div>`);
  // usamos un email "interno" derivado del usuario para Supabase Auth
  const toEmail=(u)=>u.toLowerCase().replace(/[^a-z0-9._-]/g,"")+"@album.local";
  if(authMode==="login"){
    card.appendChild(el(`<div class="stack"><div><label class="fld">Usuario</label><input id="lu" placeholder="tu usuario"></div><div><label class="fld">Contraseña</label><input id="lp" type="password" placeholder="contraseña"></div><div class="err" id="le"></div><button class="btn gold" id="lbtn">Entrar</button></div>`));
    card.querySelector("#lbtn").onclick=async()=>{
      const u=$("#lu").value.trim(),p=$("#lp").value;if(!u||!p){$("#le").textContent="Completá usuario y contraseña.";return;}
      $("#lbtn").textContent="Entrando...";
      const {error}=await sb.auth.signInWithPassword({email:toEmail(u),password:p});
      if(error){$("#le").textContent="Usuario o contraseña incorrectos.";$("#lbtn").textContent="Entrar";}
    };
  }else{
    card.appendChild(el(`<div class="stack"><div><label class="fld">Elegí un usuario</label><input id="ru" placeholder="nombre de usuario"></div><div><label class="fld">Contraseña</label><input id="rp" type="password" placeholder="creá una clave"></div><div class="err" id="re"></div><button class="btn gold" id="rbtn">Crear cuenta</button></div>`));
    card.querySelector("#rbtn").onclick=async()=>{
      const u=$("#ru").value.trim(),p=$("#rp").value;
      if(u.length<3){$("#re").textContent="El usuario necesita 3+ caracteres.";return;}
      if(p.length<6){$("#re").textContent="La clave necesita 6+ caracteres.";return;}
      $("#rbtn").textContent="Creando...";
      const {error}=await sb.auth.signUp({email:toEmail(u),password:p,options:{data:{username:u}}});
      if(error){$("#re").textContent=error.message.includes("already")?"Ese usuario ya existe.":"No se pudo crear la cuenta.";$("#rbtn").textContent="Crear cuenta";return;}
      // algunos proyectos requieren confirmar email; intentamos loguear directo
      await sb.auth.signInWithPassword({email:toEmail(u),password:p});
    };
  }
  wrap.appendChild(card);
  // selector de modo de visualización
  const modeSel=el(`<div style="margin-top:18px"><div class="fld" style="text-align:center;margin-bottom:8px">Modo de visualización</div><div class="row" style="gap:8px"><button class="btn ${viewMode==='desktop'?'gold':'ghost'} sm" id="mdesk" style="flex:1">💻 Computadora</button><button class="btn ${viewMode==='mobile'?'gold':'ghost'} sm" id="mmob" style="flex:1">📱 Celular</button></div></div>`);
  modeSel.querySelector("#mdesk").onclick=()=>{viewMode="desktop";render();};
  modeSel.querySelector("#mmob").onclick=()=>{viewMode="mobile";render();};
  wrap.appendChild(modeSel);
  const sw=el(`<div class="switch">${authMode==="login"?`¿No tenés cuenta? <b>Registrate</b>`:`¿Ya tenés cuenta? <b>Iniciá sesión</b>`}</div>`);
  sw.onclick=()=>{authMode=authMode==="login"?"register":"login";render();};wrap.appendChild(sw);
  return wrap;
}

function renderHome(screen){
  const u=user();const canDaily=Date.now()-u.lastDaily>1000*60*60*20;
  const wrap=el(`<div class="home-wrap"></div>`);
  wrap.appendChild(el(`<p class="hero-line"><span data-edit="_homeSub">${G.config.homeSub}</span></p>`));
  const row=el(`<div class="home-row"></div>`);
  [{id:"coleccion",tk:"tile_coleccion",sk:"sub_coleccion",art:"📦",badge:totalQty(u)||null},
   {id:"codigos",tk:"tile_codigos",sk:"sub_codigos",art:"🎟️",badge:null},
   {id:"album",tk:"tile_album",sk:"sub_album",art:"📖",badge:null},
   {id:"intercambio",tk:"tile_intercambio",sk:"sub_intercambio",art:"🔄",badge:tradeOffers.length||null},
   {id:"sobres",tk:"tile_sobres",sk:"sub_sobres",art:"✉️",badge:(u.packs.length+(canDaily?1:0))||null}].forEach(d=>{
    const cfg=G.config.tiles[d.id]||{},cover=cfg.cover,full=cfg.fullImage&&cover;
    let t;
    if(full)t=el(`<button class="tile fullimg"><div class="fullbg" style="background-image:url(${cover})"></div><div class="fulltint"></div><div class="label">${E(d.tk)}</div><div class="sub">${E(d.sk)}</div>${d.badge?`<span class="badge">${d.badge}</span>`:""}</button>`);
    else t=el(`<button class="tile"><div class="art ${cover?'bare':''}">${cover?`<img src="${cover}">`:d.art}</div><div class="label">${E(d.tk)}</div><div class="sub">${E(d.sk)}</div>${d.badge?`<span class="badge">${d.badge}</span>`:""}</button>`);
    t.onclick=()=>{if(editing)return;view=d.id;bookPage=0;albumIndexOpen=false;render();};row.appendChild(t);});
  wrap.appendChild(row);screen.appendChild(wrap);
}
function secHead(eb,ti){const h=el(`<div class="sec-head"><button class="back">←</button><div><div class="eyebrow">${eb}</div><h2>${ti}</h2></div></div>`);h.querySelector(".back").onclick=()=>{if(editing)return;view="home";render();};return h;}

function renderColeccion(screen){
  const u=user();screen.appendChild(secHead(`Colección de ${G.config.title}`,T("tile_coleccion")));
  const body=el(`<div class="scroll-body"></div>`);
  // controles de orden y filtro
  const teamOpts=`<option value="todos">Todos</option>`+G.teams.map(t=>`<option value="${t.id}" ${collFilter.team===t.id?'selected':''}>${t.name}</option>`).join("");
  const rarOpts=`<option value="todas">Todas</option>`+RAR_KEYS.map(k=>`<option value="${k}" ${collFilter.rar===k?'selected':''}>${RAR[k].label}</option>`).join("");
  const ctr=el(`<div class="panel" style="padding:12px"><div class="row"><div style="flex:1"><label class="fld">Ordenar</label><select id="csort"><option value="album" ${collSort==='album'?'selected':''}>Como el álbum</option><option value="num" ${collSort==='num'?'selected':''}>Número</option><option value="rareza" ${collSort==='rareza'?'selected':''}>Rareza</option><option value="equipo" ${collSort==='equipo'?'selected':''}>Equipo</option></select></div><div style="flex:1"><label class="fld">Rareza</label><select id="cfr">${rarOpts}</select></div><div style="flex:1"><label class="fld">Equipo</label><select id="cft">${teamOpts}</select></div></div></div>`);
  ctr.querySelector("#csort").onchange=e=>{collSort=e.target.value;render();};
  ctr.querySelector("#cfr").onchange=e=>{collFilter.rar=e.target.value;render();};
  ctr.querySelector("#cft").onchange=e=>{collFilter.team=e.target.value;render();};
  body.appendChild(ctr);
  body.appendChild(el(`<p class="hero-line">Repetidas a color, pegadas en gris, faltantes con signo de pregunta. Tocá una para verla grande.</p>`));
  // construir lista
  let list=G.stickers.slice();
  if(collFilter.rar!=="todas")list=list.filter(s=>s.rarity===collFilter.rar);
  if(collFilter.team!=="todos")list=list.filter(s=>s.team===collFilter.team);
  if(collSort==="album")list.sort(albumOrder);
  else if(collSort==="num")list.sort((a,b)=>(a.num||0)-(b.num||0));
  else if(collSort==="rareza")list.sort((a,b)=>RAR_KEYS.indexOf(b.rarity)-RAR_KEYS.indexOf(a.rarity)||albumOrder(a,b));
  else if(collSort==="equipo")list.sort(albumOrder);
  const grid=el(`<div class="coll-grid"></div>`);
  list.forEach(s=>{const q=u.inventory[s.id]||0,pasted=!!u.pasted[s.id],have=q>0||pasted;
    const repe=q>0; // tiene suelta(s) = a color; si solo pegada y sin suelta = gris
    const grayscale=pasted&&!repe;

// inspector: figurita grande con inclinación 3D siguiendo el mouse
function inspectSticker(s){
  const u=user();const q=u.inventory[s.id]||0,pasted=!!u.pasted[s.id];
  const ar=(s.ratio&&s.ratio>0)?s.ratio:0.75; // ancho/alto
  const bg=el(`<div class="modal-bg insp-bg"></div>`);
  const stage=el(`<div class="insp-stage"></div>`);
  const cardW=Math.min(320, Math.round(window.innerHeight*0.6*ar));
  const card=el(`<div class="insp-card ${rclass(s)} ${shineClass(s)}" style="width:${cardW}px;aspect-ratio:${ar}">
      <span class="num">#${s.num}</span>
      ${s.img?`<img src="${s.img}">`:`<div class="insp-ph">#${s.num}</div>`}
      <div class="insp-gloss"></div>
    </div>`);
  stage.appendChild(card);
  const info=el(`<div class="insp-info"><div class="t">${s.name}</div><div class="s"><span class="rar-dot ${rclass(s)}"></span>${RAR[s.rarity].label} · #${s.num}${q>0?` · tenés ×${q}`:""}${pasted?" · PEGADA":""}</div></div>`);
  stage.appendChild(info);
  const close=el(`<button class="btn ghost" style="max-width:180px;margin:14px auto 0">Cerrar</button>`);
  close.onclick=()=>bg.remove();stage.appendChild(close);
  bg.appendChild(stage);
  // efecto 3D
  const maxTilt=14;
  function move(e){
    const r=card.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width-0.5;   // -0.5..0.5
    const py=(e.clientY-r.top)/r.height-0.5;
    card.style.transform=`rotateY(${px*maxTilt*2}deg) rotateX(${-py*maxTilt*2}deg)`;
    card.querySelector(".insp-gloss").style.background=
      `radial-gradient(circle at ${(px+0.5)*100}% ${(py+0.5)*100}%, rgba(255,255,255,.35), transparent 55%)`;
  }
  function reset(){card.style.transform="rotateY(0) rotateX(0)";const g=card.querySelector(".insp-gloss");if(g)g.style.background="none";}
  card.addEventListener("mousemove",move);
  card.addEventListener("mouseleave",reset);
  // soporte táctil (celular): inclina según el dedo
  card.addEventListener("touchmove",(e)=>{if(e.touches[0])move(e.touches[0]);},{passive:true});
  card.addEventListener("touchend",reset);
  bg.onclick=(e)=>{if(e.target===bg)bg.remove();};
  document.body.appendChild(bg);
}

/* ====== LAYOUT DE PÁGINA TIPO PANINI ======
  Cada equipo = N figuritas (slotsPerTeam). Se reparten mitad/mitad por página.
  La grilla tiene C columnas. C base = 4 (para 20 figus). Cada +10 figus suma 1 columna.
  Página izquierda fila 1: [título 2col] + figus. Resto de filas: C figus.
  Página derecha: filas de C figus (la primera puede contener una horizontal).
  Para simplificar y respetar el pedido, distribuimos en orden y dejamos que las "wide" ocupen 2.
*/
function colCount(){return 4+Math.max(0,Math.floor((G.config.slotsPerTeam-20)/10));}
/* devuelve la figurita asignada a la posición (1..N) de un equipo, o null si no existe */
function stickerAtPos(teamId,pos){return G.stickers.find(s=>s.team===teamId && s.num===pos)||null;}
function renderPageGrid(team,side){
  const u=user();
  const cols=colCount();
  const total=G.config.slotsPerTeam;
  const half=Math.ceil(total/2);
  const startPos=side===0?1:half+1;
  const endPos=side===0?half:total;
  // contar columnas usadas para saber cuántas filas hacen falta
  let cells=side===0?2:0; // título ocupa 2 en izquierda
  for(let pos=startPos;pos<=endPos;pos++){const s=stickerAtPos(team.id,pos);cells+=(s&&s.wide)?2:1;}
  const rows=Math.max(1,Math.ceil(cells/cols));
  const inner=el(`<div class="page-inner"></div>`);
  const grid=el(`<div class="pgrid" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr)"></div>`);
  if(side===0){
    grid.appendChild(el(`<div class="team-title" style="grid-column:span 2"><div class="crest">${crestFace(team)}</div><div class="tname">${team.name}</div><div class="half">${startPos}–${endPos}</div></div>`));
  }
  for(let pos=startPos;pos<=endPos;pos++){
    const s=stickerAtPos(team.id,pos);
    const wide=s&&s.wide;
    if(!s){
      grid.appendChild(el(`<div class="mslot"><span class="num">#${pos}</span><span class="plus" style="color:var(--line)">+</span></div>`));
      continue;
    }
    const sid=s.id;const pasted=u.pasted[sid];const placeable=!pasted&&(u.inventory[sid]||0)>0&&canPaste(s);
    const slot=el(`<div class="mslot ${rclass(s)} ${wide?'wide':''} ${pasted?'filled':''} ${placeable?'placeable':''} ${pasted?shineClass(s):''}"><span class="num">#${s.num}</span>${pasted?figFace(s):(placeable?`<span class="plus">+</span><div class="glint"></div>`:`<span class="plus" style="color:var(--line)">+</span>`)}</div>`);
    if(placeable){let used=false;slot.onclick=()=>{if(editing||used)return;if(u.pasted[sid]||(u.inventory[sid]||0)<=0)return;used=true;u.pasted[sid]=true;u.inventory[sid]--;if(u.inventory[sid]<=0)delete u.inventory[sid];
      slot.onclick=null;slot.classList.remove("placeable");slot.classList.add("filled");if(glows(s)){slot.classList.add(s.rarity==="extra"?"shine-extra":"shine-escudo","glow-frame");}
      slot.innerHTML=`<span class="num">#${s.num}</span>`;slot.appendChild(el(`<div class="stickin">${figFace(s)}</div>`));slot.appendChild(el(`<div class="stamp"></div>`));
      toast(`¡Pegaste #${s.num} ${s.name}!`);updatePile();saveProfileSoon();};}
    grid.appendChild(slot);
  }
  inner.appendChild(grid);
  return inner;
}

// peso de aparición por rareza (mayor = más común)
const RARITY_WEIGHT={comun:100,rara:35,ultra:12,escudo:8,extra:4};
// figuritas elegibles para sobres (excluye extras y las marcadas como "no sale en sobres")
function packPool(){return G.stickers.filter(s=>s.inPack!==false && s.rarity!=="extra");}
function extraPool(){return G.stickers.filter(s=>s.inPack!==false && s.rarity==="extra");}
function weightedPick(list){
  if(!list.length)return null;
  let total=0;const acc=[];
  for(const s of list){const w=RARITY_WEIGHT[s.rarity]||50;total+=w;acc.push([total,s]);}
  const r=Math.random()*total;
  for(const [t,s] of acc){if(r<t)return s;}
  return list[list.length-1];
}
function openPack(pid){
  const u=user();u.packs=u.packs.filter(p=>p!==pid);
  u.opened=(u.opened||0)+1;
  const pool=packPool();
  const drops=[],wasNew=[];
  // 5 figuritas normales (no extra), por peso de rareza
  for(let i=0;i<5;i++){
    const s=weightedPick(pool)|| (G.stickers[0]);
    if(!s)break;
    wasNew.push(!(u.inventory[s.id]>0)&&!u.pasted[s.id]);
    u.inventory[s.id]=(u.inventory[s.id]||0)+1;drops.push(s);
  }
  // posible EXTRA como 6ª figurita (probabilidad baja, máximo uno)
  const EXTRA_CHANCE=0.12;
  const ex=extraPool();
  if(ex.length && Math.random()<EXTRA_CHANCE){
    const s=weightedPick(ex);
    if(s){wasNew.push(!(u.inventory[s.id]>0)&&!u.pasted[s.id]);u.inventory[s.id]=(u.inventory[s.id]||0)+1;drops.push(s);}
  }
  saveProfileSoon();
  const flash=el(`<div class="pack-flash"></div>`);document.body.appendChild(flash);
  setTimeout(()=>{flash.remove();
    const gotExtra=drops.some(d=>d.rarity==="extra");
    const r=el(`<div class="reveal"><h3>${gotExtra?"¡Sobre con EXTRA! ✨":"¡Tus figuritas!"}</h3></div>`);
    const cards=el(`<div class="reveal-cards"></div>`);
    drops.forEach((s,i)=>cards.appendChild(el(`<div class="reveal-card ${rclass(s)} ${glows(s)?(s.rarity==='extra'?'shine-extra':'shine-escudo')+' glow-frame':''} ${wasNew[i]?'new':''}">${figFace(s)}<div class="rlabel">#${s.num} · ${RAR[s.rarity].label}</div></div>`)));
    r.appendChild(cards);const c=el(`<button class="btn gold" style="max-width:220px">Genial</button>`);c.onclick=()=>{r.remove();render();};r.appendChild(c);document.body.appendChild(r);},1000);
}

  const rarOpts=`<option value="todas">Todas las rarezas</option>`+RAR_KEYS.map(k=>`<option value="${k}" ${admFilter.rar===k?'selected':''}>${RAR[k].label}</option>`).join("");

  return box;
}
function teamName(id){const t=G.teams.find(x=>x.id===id);return t?t.name:id;}
// orden por posición en el álbum: primero por equipo (orden de G.teams), luego por número
function albumOrder(a,b){
  const ta=G.teams.findIndex(t=>t.id===a.team),tb=G.teams.findIndex(t=>t.id===b.team);
  if(ta!==tb)return ta-tb;
  return (a.num||0)-(b.num||0);
}

// --- subir imagen a Storage y devolver URL pública ---
// redimensiona la imagen en el navegador manteniendo proporción (máx MAXW de ancho)
function resizeImage(file,maxW){return new Promise((resolve)=>{
  const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{
    let w=img.naturalWidth,h=img.naturalHeight;const ratio=w/h;
    if(w>maxW){w=maxW;h=Math.round(maxW/ratio);}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    c.toBlob(b=>resolve({blob:b,ratio:img.naturalWidth/img.naturalHeight}),"image/webp",0.85);
  };
  img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
  img.src=url;
});}
// sube y devuelve la URL pública (string). Guarda la última proporción en uploadImage.lastRatio
async function uploadImage(file){
  const r=await resizeImage(file,700);
  const blob=r?r.blob:file;
  uploadImage.lastRatio=r?r.ratio:null;
  const path="img/"+Date.now()+"-"+Math.random().toString(36).slice(2,8)+".webp";
  const {error}=await sb.storage.from("media").upload(path,blob,{upsert:true,contentType:"image/webp"});
  if(error){toast("Error subiendo imagen");return null;}
  const {data}=sb.storage.from("media").getPublicUrl(path);
  return data.publicUrl;
}

function clearBootMsg(){const bm=document.getElementById("bootmsg");if(bm)bm.remove();}
function withTimeout(promise,ms,label){return Promise.race([promise,new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout:"+label)),ms))]);}
